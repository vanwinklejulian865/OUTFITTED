<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfitted</title>

    <meta name="description" content="Outfitted — a simple closet and outfit generator. Create and save outfits from your virtual closet.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://vanwinklejulian865.github.io/OUTFITTED/">

    <!-- Open Graph / social preview -->
    <meta property="og:title" content="Outfitted">
    <meta property="og:description" content="Outfitted — a simple closet and outfit generator.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vanwinklejulian865.github.io/OUTFITTED/">
    <meta property="og:image" content="closet-bg.jpg.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>OUTFITTED</h1>
    </header>

<main>

    <div class="closet">

        <div class="closet-section" data-category="Headwear">
            <h2>HEADWEAR</h2>
            <p>(0)</p>
        </div>

        <div class="closet-section" data-category="Tops">
            <h2>TOPS</h2>
            <p>(0)</p>
        </div>

        <div class="closet-section" data-category="Bottoms">
            <h2>BOTTOMS</h2>
            <p>(0)</p>
        </div>

        <div class="closet-section" data-category="Layers">
            <h2>LAYERS</h2>
            <p>(0)</p>
        </div>

        <div class="closet-section" data-category="Shoes">
            <h2>SHOES</h2>
            <p>(0)</p>
        </div>

    </div>

</main>

    <!-- Floating Generate Button -->
   <div id="generateButton">

<div class="circle-text">
    GENERATE FIT
</div>
    <div class="plus">
        +
    </div>

</div>

    <script src="script.js"></script>

</body>
</html>
